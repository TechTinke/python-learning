<h1>Login Now</h1>
<style>
  h3 {
    color: aqua;
  }
</style>
{%for message in messages%}
<h3>{{message}}</h3>
{% endfor %}
<form method="POST" action="{% url 'login' %}">
  {% csrf_token %}
  <p>Username</p>
  <input type="text" name="username" />
  <p>Password</p>
  <input type="password" name="password" /><br />
  <input type="submit" value="Login" />
</form>
