<h1>Saved Links</h1>
<style>
  h2 {
    color: brown;
  }
  h1 {
    color: aquamarine;
  }
</style>
{% if user.is_authenticated %}
<h1>Hey, {{user.username}}</h1>
<br />
<h1>The following are your saved links</h1>
{% for saved_link in saved_links %}
<p>
  <a href="{% url 'link_detail saved_link.pk'%}">{{saved_link.url}}</a>
</p>
{% endfor %}
<a href="{% url 'logout' %}">Log out</a>
{% endif %}
